<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color-light: #ffffff;
            --text-color-light: #333333;
            --header-bg-light: #f5f5f5;
            --code-bg-light: #f6f8fa;
            --border-light: #e1e4e8;
            --link-light: #0366d6;
            
            --bg-color-dark: #0d1117;
            --text-color-dark: #c9d1d9;
            --header-bg-dark: #161b22;
            --code-bg-dark: #161b22;
            --border-dark: #30363d;
            --link-dark: #58a6ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "HarmonyOS Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            width: {{ width }}px;
            box-sizing: border-box;
        }

        body.light {
            background-color: var(--bg-color-light);
            color: var(--text-color-light);
        }

        body.dark {
            background-color: var(--bg-color-dark);
            color: var(--text-color-dark);
        }

        .container {
            padding: 40px;
            display: flex;
            flex-direction: column;
            min-height: 10px; /* will expand based on content */
        }

        .header {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
            color: inherit;
        }

        .light .header { border-color: var(--border-light); }
        .dark .header { border-color: var(--border-dark); }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            font-size: 0.9em;
            text-align: center;
            opacity: 0.7;
            border-top: 1px solid;
        }
        
        .light .footer { border-color: var(--border-light); }
        .dark .footer { border-color: var(--border-dark); }

        .content {
            line-height: 1.6;
            font-size: 16px;
        }

        /* Markdown Styles */
        .content h1, .content h2, .content h3 {
            border-bottom: 1px solid;
            padding-bottom: 0.3em;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        .light .content h1, .light .content h2, .light .content h3 { border-color: var(--border-light); }
        .dark .content h1, .dark .content h2, .dark .content h3 { border-color: var(--border-dark); }

        .content a { text-decoration: none; }
        .light .content a { color: var(--link-light); }
        .dark .content a { color: var(--link-dark); }

        .content pre {
            padding: 16px;
            overflow: auto;
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 85%;
            line-height: 1.45;
        }
        .light .content pre { background-color: var(--code-bg-light); }
        .dark .content pre { background-color: var(--code-bg-dark); }

        .content code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }
        .light .content code { background-color: var(--code-bg-light); }
        .dark .content code { background-color: var(--code-bg-dark); }
        .content pre code { background-color: transparent; }

        .content blockquote {
            padding: 0 1em;
            border-left: 0.25em solid;
            margin: 0 0 16px 0;
        }
        .light .content blockquote { color: #6a737d; border-color: #dfe2e5; }
        .dark .content blockquote { color: #8b949e; border-color: var(--border-dark); }

        .content table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-bottom: 16px;
            width: 100%;
        }
        .content table th, .content table td {
            padding: 6px 13px;
            border: 1px solid;
        }
        .light .content table th, .light .content table td { border-color: var(--border-light); }
        .dark .content table th, .dark .content table td { border-color: var(--border-dark); }
        .content table tr:nth-child(2n) { background-color: rgba(125,125,125,0.05); }

        .content img {
            max-width: 100%;
            box-sizing: content-box;
            background-color: transparent;
        }
    </style>
</head>
<body class="{{ theme }}">
    <div class="container">
        {% if header %}
        <div class="header">
            {{ header }}
        </div>
        {% endif %}

        <div class="content">
            {{ html_content | safe }}
        </div>

        {% if footer %}
        <div class="footer">
            {{ footer }}
        </div>
        {% endif %}
    </div>
</body>
</html>
